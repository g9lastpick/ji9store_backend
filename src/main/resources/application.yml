###################### local info



server:
  port: 8080

## 윤영 db 연결 테스트
spring:
  datasource:
    url: jdbc:p6spy:mariadb://g9-prd-store-mariadb.cxwwuys2okv0.ap-northeast-2.rds.amazonaws.com:3306/posdb      ## cj aws db
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
#    driver-class-name: org.mariadb.jdbc.Driver
    driver-class-name: com.p6spy.engine.spy.P6SpyDriver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 1
      idle-timeout: 60000        # 60초 후 유휴 커넥션 닫기
      max-lifetime: 1800000      # 30분 후 커넥션 재생성
      keepalive-time: 300000     # 5분마다 ping
      connection-test-query: SELECT 1


  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 30MB

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none
    open-in-view: false
    repositories:
      bootstrap-mode: default  # ⚠️ deferred는 rollback-only 이슈 유발 가능
    properties:
      hibernate:
        enable_lazy_load_no_trans: true
        globally_quoted_identifiers: true
        format_sql: true
        jpaql:
          strict: false
        query:
          fail_on_pagination_over_collection_fetch: false
        default_batch_fetch_size: 100

   
  devtools:
    restart:
      enabled: true

#  data:
#    redis:
#      host: localhost
#      port: 6379

# keycloak config
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${app.keycloak-home}/realms/jjpos
#          issuer-uri: https://jjpos.store/auth/realms/jjpos

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.jjsoft.pos.dto
  configuration:
    map-underscore-to-camel-case: true	
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

logging:
  config: classpath:logback-spring.xml
  level:
    org.hibernate.resource.transaction: error
    org.hibernate.internal.AbstractSharedSessionContract: error
    org.springframework.data.jpa.repository.query: warn


## App Base Info 
app: 
  base-url: http://localhost
  keycloak-home: ${app.base-url}:8180 
  mode: local
  keycloak-db-url: ${KEYCLOAK_DB_URL:jdbc:mariadb://localhost:3306/keycloakdb}
  keycloak-db-user: ${KEYCLOAK_DB_USER}
  keycloak-db-pwd: ${KEYCLOAK_DB_PWD}



## 멀티점포 점포 격리 강제 여부
## false(기본, 감사 모드): 위반을 로그로만 남기고 통과 — user_store_map 매핑 시딩 기간용(기존 관리자 잠금 방지)
## true(강제 모드): 다른 점포 storeId 요청 시 403. 매핑 시딩 완료 후 운영에서 true 로 전환
multistore:
  enforce-store-access: false

## 인증서버 설정 ㅈ정보
keycloak:
  auth-server-url: ${app.keycloak-home}
  realm: jjpos
  admin-username: ${KEYCLOAK_ADMIN_USERNAME}
  admin-password: ${KEYCLOAK_ADMIN_PASSWORD}
  client-id: jjpos-backend
  idp-alias: oidc-kakao
  credentials:
    secret: ${KEYCLOAK_CLIENT_SECRET}

## aws object storagy를 써서 경로 이제 안씀.
file:
  upload:
    image-path: ${FILE_UPLOAD_IMAGE_PATH:/var/www/images/products/}
    access-url-prefix: /upload/images/products/	


## aws object storagy 정보 
aws:
  s3:
    bucket: ${AWS_S3_BUCKET:g9system-image-bucket}
    region: ${AWS_S3_REGION:ap-northeast-2}
    access-key: ${AWS_S3_ACCESS_KEY}
    secret-key: ${AWS_S3_SECRET_KEY}
         
